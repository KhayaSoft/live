services:
  - type: web
    name: globalspeak-backend
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
